<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager — Tax Dispute Resolution</title>
  <style>
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; }
    #login-overlay {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; background: var(--cream, #f8f4ee);
    }
    #login-overlay h2 { color: #0f2240; margin-bottom: 1.5rem; }
    #login-overlay button {
      background: #0f2240; color: #fff; padding: 0.85rem 2rem;
      font-size: 1rem; font-weight: 600; border: none; border-radius: 3px;
      cursor: pointer; text-transform: uppercase; letter-spacing: 0.06em;
    }
    #login-overlay button:hover { background: #1a3a5c; }
    .hidden { display: none !important; }
  </style>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <div id="login-overlay">
    <h2>Tax Dispute Resolution — Content Manager</h2>
    <button id="netlify-login">Log in to Edit Content</button>
  </div>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Show login button
    var loginBtn = document.getElementById('netlify-login');
    var loginOverlay = document.getElementById('login-overlay');

    loginBtn.addEventListener('click', function() {
      netlifyIdentity.open('login');
    });

    // When logged in, hide the overlay and reload
    netlifyIdentity.on('login', function() {
      loginOverlay.classList.add('hidden');
      // Decap CMS needs a reload after login to init the CMS
      document.location.reload();
    });

    netlifyIdentity.on('logout', function() {
      loginOverlay.classList.remove('hidden');
      document.location.reload();
    });

    // Check if already logged in
    netlifyIdentity.on('init', function(user) {
      if (user) {
        loginOverlay.classList.add('hidden');
      }
    });

    // Initialize Netlify Identity
    netlifyIdentity.init();

    // Register preview styles for Decap CMS
    CMS.registerPreviewStyle('/css/style.css');
  </script>
</body>
</html>
