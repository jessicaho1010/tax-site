name: Daily Article Generator

on:
  schedule:
    # Runs at 08:00 UTC every day (16:00 Beijing time)
    - cron: "0 8 * * *"
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions UI

# Ensure only one instance runs at a time
concurrency:
  group: daily-article
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate article
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL || 'claude-haiku-4-5-20251001' }}
        run: node scripts/generate-article.js

      - name: Commit and push
        if: success()
        run: |
          git config user.name "Tax Insight Bot"
          git config user.email "bot@taxdisputeresolution.netlify.app"

          # Stage the new article
          git add content/insights/

          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "📝 Daily insight: ${{ steps.generate.outputs.article_title }}"
          git push origin master
